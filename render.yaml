# Render Blueprint – deploys the full MicroHustle stack
# https://render.com/docs/blueprint-spec

databases:
  - name: microhustle-db
    plan: free
    databaseName: microhustle
    user: microhustle

services:
  # ---- Spring Boot API ----
  - type: web
    name: microhustle-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: microhustle-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: microhustle-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: microhustle-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: microhustle-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: microhustle-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://microhustle.onrender.com
      - key: PORT
        value: "8080"

  # ---- React Frontend (static site) ----
  - type: web
    name: microhustle
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://microhustle-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
