# Render Blueprint – deploys the full MicroHustle stack
# https://render.com/docs/blueprint-spec


services:
  # ---- Spring Boot API ----
  - type: web
    name: microhustle-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: JDBC_DATABASE_URL
        sync: false
      - key: DB_HOST
        value: db.setvqbbsiruhlfbujlcc.supabase.co
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: postgres
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL_MODE
        value: "?sslmode=require"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://microhustle.onrender.com
      - key: PORT
        value: "8080"

  # ---- React Frontend (static site) ----
  - type: web
    name: microhustle
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://microhustle-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
