# ==========================================
# DATABASE
# ==========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:microhustle}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================
# SERVER
# ==========================================
server.port=${PORT:8080}

# ==========================================
# JWT AUTHENTICATION
# ==========================================
jwt.secret=${JWT_SECRET:MicroHustle2026SecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ==========================================
# FILE UPLOAD
# ==========================================
file.upload-dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ==========================================
# CORS
# ==========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ==========================================
# LOGGING (production-ready)
# ==========================================
logging.level.root=INFO
logging.level.com.microhustle=INFO
logging.level.org.springframework.security=WARN